<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced RAG Visual Simulator</title>

<style>

body{
font-family: Inter,system-ui;
background:#0f172a;
color:white;
margin:0;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.panel{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input{
padding:12px;
width:60%;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.chunk{
background:#334155;
padding:10px;
margin:6px 0;
border-radius:6px;
font-size:14px;
}

.highlight{
border:2px solid #22c55e;
}

.embedding{
font-size:12px;
opacity:0.8;
}

.score{
float:right;
color:#22c55e;
}

.prompt{
background:#020617;
padding:15px;
border-radius:10px;
white-space:pre-wrap;
}

.answer{
background:#064e3b;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.slider{
margin-left:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>🔎 Retrieval Augmented Generation Visual Simulator</h1>

<div class="panel">

<input id="query" placeholder="Ask something (ex: What is RAG?)">

<button onclick="runRAG()">Run RAG</button>

<label class="slider">
Top-K
<input type="range" min="1" max="5" value="2" id="topk">
<span id="kval">2</span>
</label>

</div>

<div class="panel">
<h3>📚 Knowledge Base (Chunks)</h3>
<div id="chunks"></div>
</div>

<div class="panel">
<h3>🧮 Embedding + Similarity</h3>
<div id="similarity"></div>
</div>

<div class="panel">
<h3>🧠 Prompt Augmentation</h3>
<div id="prompt" class="prompt"></div>
</div>

<div class="panel">
<h3>🤖 LLM Generation</h3>
<div id="answer" class="answer"></div>
</div>

</div>

<script>

const docs=[
"Retrieval Augmented Generation improves LLM accuracy.",
"Vector databases store embeddings for semantic search.",
"Embeddings convert text into numeric vectors.",
"Similarity search finds the most relevant chunks.",
"Large Language Models generate responses from prompts."
];

let chunks=docs.map((d,i)=>({
text:d,
embedding:randomVector()
}));

function randomVector(){

let v=[];
for(let i=0;i<5;i++){
v.push(Math.random().toFixed(2));
}
return v;

}

function renderChunks(){

let container=document.getElementById("chunks");
container.innerHTML="";

chunks.forEach((c,i)=>{

let div=document.createElement("div");

div.className="chunk";

div.innerHTML=`
${c.text}
<div class="embedding">Embedding: [${c.embedding}]</div>
`;

container.appendChild(div);

});

}

renderChunks();

function cosine(a,b){

let sum=0;

for(let i=0;i<a.length;i++){
sum+=a[i]*b[i];
}

return sum.toFixed(2);

}

function runRAG(){

let query=document.getElementById("query").value;

let queryEmbedding=randomVector();

let similarityResults=[];

chunks.forEach(c=>{

let score=cosine(queryEmbedding,c.embedding);

similarityResults.push({
chunk:c,
score:score
});

});

similarityResults.sort((a,b)=>b.score-a.score);

let k=document.getElementById("topk").value;

document.getElementById("kval").innerText=k;

let retrieved=similarityResults.slice(0,k);

showSimilarity(similarityResults,retrieved);

buildPrompt(query,retrieved);

generateAnswer(query,retrieved);

}

function showSimilarity(results,retrieved){

let container=document.getElementById("similarity");

container.innerHTML="";

results.forEach(r=>{

let div=document.createElement("div");

div.className="chunk";

if(retrieved.includes(r)){
div.classList.add("highlight");
}

div.innerHTML=`
${r.chunk.text}
<span class="score">${r.score}</span>
`;

container.appendChild(div);

});

}

function buildPrompt(query,retrieved){

let context=retrieved.map(r=>r.chunk.text).join("\n");

let prompt=`
User Question:
${query}

Retrieved Context:
${context}

Instruction:
Answer the question using the retrieved context.
`;

document.getElementById("prompt").innerText=prompt;

}

function generateAnswer(query,retrieved){

let answerBox=document.getElementById("answer");

answerBox.innerText="";

let context=retrieved.map(r=>r.chunk.text).join(" ");

let answer=`Based on retrieved knowledge: ${context} 

The system used vector similarity to find the most relevant information before generating this answer.`;

let i=0;

let interval=setInterval(()=>{

answerBox.innerText+=answer[i];

i++;

if(i>=answer.length){
clearInterval(interval);
}

},20);

}

</script>

</body>
</html>
